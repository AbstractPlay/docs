name: Deploy Docs Prod

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [dep_update_prod]
  workflow_dispatch:

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    env:
      DOCS_CF_DIST: ${{ secrets.DOCS_CF_DIST_PROD }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          submodules: recursive
          token: ${{ secrets.PAT_READ_PACKAGES }}

      - name: Update submodules to latest branch tip
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive
          for path in vendor/renderer vendor/gameslib vendor/node-backend vendor/recranks vendor/backend-crons; do
            git -C "$path" fetch --depth=1 origin main
            git -C "$path" checkout FETCH_HEAD
          done

      - uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: npm

      - name: Configure npm for GitHub Packages
        run: |
          echo "@abstractplay:registry=https://npm.pkg.github.com/" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.PAT_READ_PACKAGES }}" >> .npmrc

      - run: npm ci
      - run: npm run build
        env:
          DOCS_STAGE: prod

      - name: Configure AWS credentials
        uses: Fooji/create-aws-profile-action@v1
        with:
          profile: AbstractPlayProd
          region: us-east-1
          key: ${{ secrets.AWS_KEY }}
          secret: ${{ secrets.AWS_SECRET }}

      - name: Deploy to S3
        run: npx serverless client deploy --stage prod --no-confirm

      - name: CloudFront invalidation
        if: env.DOCS_CF_DIST != ''
        env:
          AWS_SDK_LOAD_CONFIG: "1"
          AWS_PROFILE: AbstractPlayProd
        run: aws cloudfront create-invalidation --distribution-id "$DOCS_CF_DIST" --paths "/*"
